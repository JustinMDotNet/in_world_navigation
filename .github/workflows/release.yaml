name: Release Workflow

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.21)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # Tag name to release. For tag-push triggers this is github.ref_name
      # (e.g. v0.1.21). For workflow_dispatch we honor the operator-supplied
      # tag input so a release can be re-run for an existing tag without
      # producing zips named after the dispatched branch.
      RELEASE_REF: ${{ inputs.tag || github.ref_name }}
      GIT_CLIFF_VERSION: 0.10.0
      CHANGELOG_FILE: ${{ github.workspace }}-CHANGES.md

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          submodules: recursive
          fetch-depth: 0  # git-cliff needs full history
          persist-credentials: false

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: amd64

      - name: Configure CMake
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CI_BUILD=ON -DGITHUB_ENV="$env:GITHUB_ENV" -G Ninja

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config RelWithDebInfo

      - name: Install git-cliff
        run: |
          $url = "https://github.com/orhun/git-cliff/releases/download/v${env:GIT_CLIFF_VERSION}/git-cliff-${env:GIT_CLIFF_VERSION}-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile git-cliff.zip
          Expand-Archive -Path git-cliff.zip -DestinationPath ${{ github.workspace }}/git-cliff-bin -Force
          $cliffDir = (Get-ChildItem ${{ github.workspace }}/git-cliff-bin -Directory | Select-Object -First 1).FullName
          echo "$cliffDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding UTF8 -Append

      - name: Generate changelog
        run: |
          git-cliff --current --strip header
          git-cliff --current --strip header -o ${{ env.CHANGELOG_FILE }}
          Get-Content requirements.md | Add-Content ${{ env.CHANGELOG_FILE }}

      - name: Zip game_dir
        run: tar -cvf "${{ github.workspace }}/${{ env.MOD_SLUG }}_${{ env.RELEASE_REF }}.zip" --format=zip *
        working-directory: game_dir

      - name: Zip game_dir_debug
        run: tar -cvf "${{ github.workspace }}/${{ env.MOD_SLUG }}_${{ env.RELEASE_REF }}_pdb.zip" --format=zip *
        working-directory: game_dir_debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_REF }}
          name: ${{ env.RELEASE_REF }}${{ env.CYBERPUNK_2077_GAME_VERSION_STR }}
          body_path: ${{ env.CHANGELOG_FILE }}
          append_body: true
          files: |
            ${{ env.MOD_SLUG }}_${{ env.RELEASE_REF }}*.zip
          prerelease: ${{ contains(env.RELEASE_REF, '-') || contains(env.RELEASE_REF, '_') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
