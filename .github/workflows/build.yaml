name: Build Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build (${{ matrix.config }})
    runs-on: windows-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # On PRs, only build RelWithDebInfo to keep CI fast.
        # On push to main / manual dispatch, also build Debug.
        config: ${{ github.event_name == 'pull_request' && fromJSON('["RelWithDebInfo"]') || fromJSON('["Debug", "RelWithDebInfo"]') }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        submodules: recursive
        persist-credentials: false

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1.13.0
      with:
        arch: amd64

    - name: Configure CMake
      run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DCMAKE_CI_BUILD=ON -DGITHUB_ENV="$env:GITHUB_ENV" -G Ninja

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.config }}

    - name: Compute short SHA
      run: echo "SHORT_SHA=$("${{ github.sha }}".SubString(0, 7))" >> $env:GITHUB_ENV

    - name: Pretty config name
      run: |
        $config = "${{ matrix.config }}"
        if ($config -eq "RelWithDebInfo") { $config = "release" } else { $config = $config.ToLower() }
        echo "PRETTY_CONFIG=${config}" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append

    - name: Upload mod artifact
      uses: actions/upload-artifact@v5
      with:
        name: ${{ env.MOD_ZIP_FILENAME }}_${{ env.PRETTY_CONFIG }}_${{ env.SHORT_SHA }}
        path: ${{ github.workspace }}/game_dir/**
        retention-days: 14
        if-no-files-found: error

    - name: Upload debug symbols (PDB)
      uses: actions/upload-artifact@v5
      with:
        name: ${{ env.MOD_ZIP_FILENAME }}_${{ env.PRETTY_CONFIG }}_${{ env.SHORT_SHA }}_pdb
        path: ${{ github.workspace }}/game_dir_debug/**
        retention-days: 14
        if-no-files-found: warn